  <table>

        <th>Producto</th>

        <th>Precio</th>
        <th>Stock</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>

      <tr>
        <td>#001</td>
        <td>Hamburguesa clásica</td>

          <span class="status active">
            Disponible
          </span>
        </td>

        <td class="actions">
          <button class="edit-btn">Editar</button>
          <button class="delete-btn">Eliminar</button>
        </td>
      </tr>

      <tr>
        <td>#002</td>
        <td>Pizza pepperoni</td>

        </td>

        <td class="actions">
          <button class="edit-btn">Editar</button>
          <button class="delete-btn">Eliminar</button>
        </td>
      </tr>

      <tr>
        <td>#003</td>
        <td>Coca Cola</td>
        <td>Bebidas</td>
        <td>$35</td>
        <td>40</td>

        <td>
          <span class="status inactive">

        </td>

        <td class="actions">

        </td>

    </tbody>

  </table>

</div>
